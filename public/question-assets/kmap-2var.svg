<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">Two variable Karnaugh map</title>
  <desc id="desc">Karnaugh map for variables A and B with ones in columns B=1 for both A rows.</desc>
  <rect width="420" height="260" fill="#f8fafc"/>
  <g transform="translate(96 52)" font-family="Arial, sans-serif" fill="#1f2937">
    <text x="92" y="-18" font-size="20" font-weight="700">B</text>
    <text x="-44" y="84" font-size="20" font-weight="700">A</text>
    <text x="54" y="-2" font-size="16">0</text>
    <text x="154" y="-2" font-size="16">1</text>
    <text x="-28" y="56" font-size="16">0</text>
    <text x="-28" y="156" font-size="16">1</text>
    <rect x="0" y="0" width="200" height="200" fill="#ffffff" stroke="#475569" stroke-width="3"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#475569" stroke-width="2"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#475569" stroke-width="2"/>
    <text x="43" y="62" font-size="36" font-weight="700">0</text>
    <text x="143" y="62" font-size="36" font-weight="700" fill="#0f766e">1</text>
    <text x="43" y="162" font-size="36" font-weight="700">0</text>
    <text x="143" y="162" font-size="36" font-weight="700" fill="#0f766e">1</text>
  </g>
</svg>
